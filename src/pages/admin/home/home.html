<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../../../src/style.css" />
  </head>

  <body>
    <header>
      <h1>Panel Administración</h1>
      <a href="/src/pages/client/home/home.html">Volver a la tienda</a>
      <a href="#" id="logout-link">Cerrar Sesión</a>
      <hr />
    </header>
    <main>
      <section>
        <h3>Gestión de Productos</h3>
        <button>+ Nuevo Producto</button>
        <table border="1" cellspacing="0" cellpadding="5">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="products-table-body"></tbody>
        </table>
      </section>
      <hr />
      <section>
        <h2>Agregar Producto Rapido</h2>
        <form>
          <label for="nombre">Nombre:</label>
          <br />
          <input type="text" id="nombre" placeholder="Nombre" required />
          <br />
          <label for="precio">Precio:</label>
          <br />
          <input type="number" id="precio" placeholder="Precio" required />
          <br />
          <label for="stock">Stock:</label>
          <br />
          <input type="number" id="stock" placeholder="Stock" required />
          <br />
          <label for="categoria">Categoría:</label>
          <br />
          <select id="categoria" placeholder="Categoría" required>
            <option value="">Seleccionar categoría</option>
            <option value="Hamburguesas">Hamburguesas</option>
            <option value="Pizzas">Pizzas</option>
            <option value="Bebidas">Bebidas</option>
          </select>
          <br />
          <label for="descripcion">Descripción:</label>
          <br />
          <textarea
            id="descripcion"
            placeholder="Ingresa los ingredientes..."
            cols="35"
            rows="4"
            required
          ></textarea>
          <br />
          <button type="submit">Guardar Producto</button>
        </form>
      </section>
    </main>
    <footer>
      <p>Panel de Administración - Food Store v1.0</p>
    </footer>
    <script type="module" src="./home.ts"></script>
    <script type="module" src="../../../../src/routeGuard.ts"></script>
    <script type="module" src="../../../../src/auth/logout.ts"></script>
  </body>
</html>
